text:
  intro: '第一次使用建议按顺序完成 4 步：选站点、填任务、填登录信息、确认保存位置，然后点击“开始任务”。'
  update_strategy_hint: '这个设置主要在“单本链接”任务里生效。收藏页和页码范围任务本轮先不单独区分每本书的更新策略。'
  login_hint_masiro_cookie: '真白萌使用 Cookie 登录时，一般不需要额外设置 Chrome。'
  login_hint_masiro_account: '真白萌使用账号密码登录时，需要本机可用的 Chrome；如果自动识别失败，请在下方手动选择。'
  remember_password_hint: '勾选后，密码会优先保存到 macOS 钥匙串，不再默认明文写入配置文件。'
  keychain_unavailable_hint: '当前环境还不能安全保存密码；本次输入的密码只会用于当前任务，不会长期保存。'
  purchase_hint: '如果单章价格超过这个值，程序会自动跳过，不会继续购买。'
  proxy_hint: '一般留空即可。只有你平时就需要代理访问站点时，才需要填写。'
  output_root_hint: '默认会在你选择的输出目录里自动创建 epub、txt、images 三个子文件夹。'
  chrome_path_hint: '只有真白萌使用账号密码登录时通常才需要设置 Chrome；使用 Cookie 登录时一般不用填。'
  maintenance_placeholder: '这一块会在第二轮接通，第一轮先保留结构，不执行实际维护操作。'
  log_hint: '如果任务失败，请先看最后几行日志，通常能直接看到是哪一步出了问题。'
