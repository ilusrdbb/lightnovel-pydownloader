name: Build and Release

on:
  push:
    branches: [master]

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract VERSION
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import re; print(re.search(r'VERSION = \"(.+?)\"', open('lightnovel.py', encoding='utf-8').read()).group(1))")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract commit message
        id: commit
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B)
          MSG="${MSG//'%'/'%25'}"
          MSG="${MSG//$'\n'/'%0A'}"
          MSG="${MSG//$'\r'/'%0D'}"
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Install dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          # uvloop doesn't support Windows, skip it
          grep -v "^uvloop" requirements.txt | xargs pip install

      - name: Install UPX
        shell: bash
        run: |
          choco install upx -y

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller lightnovel_exe.spec

      - name: Create release zip
        shell: bash
        run: |
          zip -j lightnovel-pydownloader.zip dist/lightnovel.exe config.yaml advance.yaml

      - name: Delete existing tag if any
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
        continue-on-error: true
        run: |
          gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          body: ${{ steps.commit.outputs.message }}
          files: lightnovel-pydownloader.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
