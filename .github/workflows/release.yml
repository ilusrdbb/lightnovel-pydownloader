name: Build and Release

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract VERSION
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import re; print(re.search(r'VERSION = \"(.+?)\"', open('lightnovel.py', encoding='utf-8').read()).group(1))")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract commit message
        shell: bash
        run: |
          git log -1 --pretty=%B > commit-msg.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          # uvloop doesn't support Windows, skip it
          grep -v "^uvloop" requirements.txt | xargs python -m pip install

      - name: Install UPX
        shell: bash
        run: |
          choco install upx -y

      - name: Build CLI with PyInstaller
        shell: bash
        run: |
          pyinstaller lightnovel_exe.spec

      - name: Build GUI with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --noconsole --name lightnovel-gui --add-data "config.yaml;." --add-data "advance.yaml;." lightnovel_gui.py

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\lightnovel.exe, dist\lightnovel-gui.exe, config.yaml, advance.yaml -DestinationPath lightnovel-pydownloader.zip

      - name: Delete existing tag if any
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
        continue-on-error: true
        run: |
          gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          body_path: commit-msg.txt
          files: lightnovel-pydownloader.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
